name: Test

on:
  workflow_call:
  push:
  pull_request:
  merge_group: # Needed for PR merge queues
    types: [ checks_requested ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
            11.0.x
      - name: Install dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Run Tests
        run: dotnet test --no-build

  test-pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Pack TypedHttp
        run: |
          dotnet pack src/TypedHttp/TypedHttp.csproj -c Release -o ./pkg
          dotnet pack src/TypedHttp.Common/TypedHttp.Common.csproj -c Release -o ./pkg
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-package
          path: ./pkg

  package-consumption-test:
    name: Package Consumption (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    needs: test-pack
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.0', '9.0', '10.0', '11.0']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ matrix.dotnet }}.x
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-package
          path: ./pkg
      - name: Create local package feed config
        run: |
          ls -lAFh $(pwd)/pkg
          local_feed=$(pwd)/pkg
          cat > ./nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-artifact" value="${local_feed}" />
              <add key="nuget" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceMapping>
              <packageSource key="local-artifact">
                <package pattern="TypedHttp" />
                <package pattern="TypedHttp.Common" />
              </packageSource>
              <packageSource key="nuget">
                <package pattern="*" />
              </packageSource>
            </packageSourceMapping>
          </configuration>
          EOF

      - name: Swap sample project reference for package
        run: |
          dotnet remove src/TypedHttp.Sample/TypedHttp.Sample.csproj reference src/TypedHttp/TypedHttp.csproj
          dotnet add src/TypedHttp.Sample/TypedHttp.Sample.csproj package TypedHttp --prerelease

      - name: Restore sample project
        run: |
          dotnet restore src/TypedHttp.Sample/TypedHttp.Sample.csproj \
            --configfile ./nuget.config \
            -p:TargetFramework=net${{ matrix.dotnet }}

      - name: Build sample project with installed package
        run: |
          dotnet build src/TypedHttp.Sample/TypedHttp.Sample.csproj \
            --no-restore \
            -p:TargetFramework=net${{ matrix.dotnet }}

      - name: Swap runtime integration test project reference for package
        run: |
          dotnet remove test/TypedHttp.RuntimeIntegrationTests/TypedHttp.RuntimeIntegrationTests.csproj reference src/TypedHttp/TypedHttp.csproj
          dotnet remove test/TypedHttp.RuntimeIntegrationTests/TypedHttp.RuntimeIntegrationTests.csproj reference src/TypedHttp.Common/TypedHttp.Common.csproj
          dotnet add test/TypedHttp.RuntimeIntegrationTests/TypedHttp.RuntimeIntegrationTests.csproj package TypedHttp --prerelease

      - name: Restore runtime integration tests
        run: |
          dotnet restore test/TypedHttp.RuntimeIntegrationTests/TypedHttp.RuntimeIntegrationTests.csproj \
            --configfile ./nuget.config \
            -p:TargetFramework=net${{ matrix.dotnet }}

      - name: Run runtime integration tests with installed package
        run: |
          dotnet test test/TypedHttp.RuntimeIntegrationTests/TypedHttp.RuntimeIntegrationTests.csproj \
            --no-restore \
            -p:TargetFramework=net${{ matrix.dotnet }}
